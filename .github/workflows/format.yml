name: Format (Spotless apply)

# Manually triggered. Runs `mvn spotless:apply` on the selected branch
# and commits the changes back. Use this when CI lint fails on formatting
# and you want the bot to fix it for you.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to format'
        required: true
        default: 'main'

permissions:
  contents: write

jobs:
  apply:
    name: Apply Spotless
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Apply Spotless
        run: mvn -B -ntp spotless:apply

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No formatting changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: apply Spotless formatting

          Automated formatting via the format.yml workflow."
          git push origin HEAD:${{ inputs.branch }}
