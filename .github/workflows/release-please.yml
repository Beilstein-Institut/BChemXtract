name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Run release-please
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_BCHEMXTRACT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
